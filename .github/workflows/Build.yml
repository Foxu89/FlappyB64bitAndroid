name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build variant'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build APK
      run: |
        if [ "${{ github.event.inputs.build_variant }}" = "release" ]; then
          ./gradlew assembleRelease
        else
          ./gradlew assembleDebug
        fi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flappybird-${{ github.event.inputs.build_variant }}
        path: |
          app/build/outputs/apk/**/*.apk
        if-no-files-found: error
        retention-days: 7
